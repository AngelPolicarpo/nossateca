name: Build lexicon Windows

on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Node dependencies
        working-directory: lexicon
        run: npm ci

      - name: Build frontend
        working-directory: lexicon
        run: npm run build

      - name: Build Tauri (Windows bundle)
        working-directory: lexicon
        env:
          CARGO_TERM_COLOR: always
        run: npx --yes @tauri-apps/cli@^2 build --target x86_64-pc-windows-msvc

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: lexicon-windows
          path: lexicon/src-tauri/target/release/bundle
